services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cruxnews
      POSTGRES_USER: cruxnews
      POSTGRES_PASSWORD: cruxnews
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cruxnews -d cruxnews"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
