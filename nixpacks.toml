[phases.setup]
nixPkgs = ["nodejs_20", "python312"]

[phases.install]
cmds = [
  "npm install --prefix frontend",
  "pip install -r backend/requirements.txt"
]

[phases.build]
cmds = ["npm run build --prefix frontend"]

[start]
cmd = "gunicorn app:app --chdir backend --bind 0.0.0.0:$PORT --workers 2 --timeout 60 --log-level info"
